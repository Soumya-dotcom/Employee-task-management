<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tasks-Employee Task Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar">
            <h2 class="sidebar-title">ETM</h2>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="employees.html" class="nav-link">Employees</a>
            <a href="tasks.html" class="nav-link active">Tasks</a>
            <button id="logoutBtn" class="nav-link logout-btn">Logout</button>
        </nav>

        <main class="main-content">
            <header class="topbar">
                <h1>Tasks</h1>
                <button id="addTaskBtn" class="btn-primary btn-small">+ Add Task</button>
            </header>

            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="Search by task title...">
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>
                <select id="priorityFilter">
                    <option value="">All Priorities</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
                <select id="sortBy">
                    <option value="">Sort by</option>
                    <option value="created_at">Newest</option>
                    <option value="due_date">Due Date</option>
                    <option value="priority">Priority</option>
                    <option value="status">Status</option>
                </select>
            </div>

            <p class="msg" id="listMsg" style="display:none;"></p>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Title</th><th>Assigned To</th><th>Priority</th>
                        <th>Status</th><th>Due Date</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody"></tbody>
            </table>

            <footer class="app-footer">Employee Task Management System &copy; 2026 — Internal Admin Tool</footer>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="taskModal" style="display:none;">
        <div class="modal-box">
            <h2 id="modalTitle">Add Task</h2>
            <p class="error-msg" id="formError" style="display:none;"></p>

            <form id="taskForm" novalidate>
                <input type="hidden" id="taskId">

                <label for="title">Task Title</label>
                <input type="text" id="title" maxlength="150" required>
                <span class="field-error" id="err_title"></span>

                <label for="description">Description <span id="charCount">(0/500)</span></label>
                <textarea id="description" maxlength="500" rows="3"></textarea>

                <label for="employee_id">Assign To</label>
                <select id="employee_id">
                    <option value="">Unassigned</option>
                </select>

                <label for="priority">Priority</label>
                <select id="priority">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>

                <label for="status">Status</label>
                <select id="status">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>

                <label for="due_date">Due Date</label>
                <input type="date" id="due_date" required>
                <span class="field-error" id="err_due_date"></span>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/tasks.js"></script>
</body>
</html>
